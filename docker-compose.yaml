version: '3.8'

services:
  # 1. The Database
  postgres:
    image: postgres:15-alpine
    container_name: auth_postgres
    environment:
      # These pull directly from the .env file
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Your Application
  authentication-ms:
    build:
      context: ./authentication-ms # Tells Docker to build the Dockerfile in this folder
    container_name: authentication-ms
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILE}
      # Construct the DB URL using the docker service name "postgres" instead of "localhost"
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      # Map your env variable to the one expected by application-stand.yaml
      - JWT_SECRET=${APP_JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy # Waits for Postgres to be fully ready before starting the app

  # 3. Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 4. Grafana
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default login is admin / admin
    depends_on:
      - prometheus


volumes:
  postgres_data: